# Phase 3 — API Gateway + BFF + Load Balancing.
# ONE command runs everything. The API GATEWAY (port 8080) is the ONLY app entry
# point exposed to the host; all other services are internal.
#
# Before running, publish all services on the host (NuGet restore fails inside
# Docker on this machine), then bring everything up:
#   ./publish-all.sh        (or  ./publish-all.ps1  on PowerShell)
#   docker compose up --build
#
# Client -> apigateway (YARP) -> { catalog-lb -> productcatalog x2, inventory,
#                                  order, notification, webbff }
services:

  # ----------------------- Databases (host ports kept for dev) -----------------------

  mongo:
    image: mongo:7
    container_name: ecommerce-mongo
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:16
    container_name: ecommerce-postgres
    environment:
      POSTGRES_PASSWORD: "Your_password123"
      POSTGRES_DB: "InventoryDb"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ecommerce-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Your_password123\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mssql-data:/var/opt/mssql

  redis:
    image: redis:7
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - redis-data:/data

  # Message broker for the async order saga. Management UI on 15672 (guest/guest).
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ecommerce-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI: http://localhost:15672
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  # Phase 5: Seq log aggregator. Every service ships structured Serilog events
  # here; browse and filter them (e.g. by CorrelationId) at http://localhost:5341.
  # Inside the compose network the services log to http://seq (port 80).
  seq:
    image: datalust/seq:2024
    container_name: ecommerce-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"     # Seq UI + ingestion: http://localhost:5341
    volumes:
      - seq-data:/data

  # ----------------------- Backend services (internal only) -----------------------

  # NOTE: no container_name and no host ports, so it can be scaled to N replicas.
  productcatalog:
    build:
      context: ./src/ProductCatalogService
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Mongo__ConnectionString: "mongodb://mongo:27017"
      Mongo__Database: "ProductCatalog"
      # Cache-aside read cache in Redis logical DB 1 (Notification uses DB 0).
      Redis__ConnectionString: "redis:6379,defaultDatabase=1"
      Seq__ServerUrl: "http://seq"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "dotnet", "ProductCatalogService.dll", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      replicas: 2

  # Nginx load balancer in front of the productcatalog replicas.
  catalog-lb:
    image: nginx:1.27-alpine
    container_name: ecommerce-catalog-lb
    volumes:
      - ./infra/catalog-lb/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - productcatalog

  inventory:
    build:
      context: ./src/InventoryService
      dockerfile: Dockerfile
    container_name: ecommerce-inventory
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=InventoryDb;Username=postgres;Password=Your_password123"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      Seq__ServerUrl: "http://seq"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "dotnet", "InventoryService.dll", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  order:
    build:
      context: ./src/OrderService
      dockerfile: Dockerfile
    container_name: ecommerce-order
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=OrderDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False"
      # Only product validation stays synchronous (via the catalog load balancer).
      Services__ProductCatalog: "http://catalog-lb:80"
      # Inventory + notification are now event-driven over RabbitMQ.
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      Seq__ServerUrl: "http://seq"
    depends_on:
      sqlserver:
        condition: service_healthy
      catalog-lb:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "dotnet", "OrderService.dll", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  notification:
    build:
      context: ./src/NotificationService
      dockerfile: Dockerfile
    container_name: ecommerce-notification
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      # NotificationService uses Redis logical DB 0 (catalog cache uses DB 1).
      Redis__ConnectionString: "redis:6379"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Username: "guest"
      RabbitMq__Password: "guest"
      Seq__ServerUrl: "http://seq"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "dotnet", "NotificationService.dll", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ----------------------- BFF (internal, reached via gateway /bff) -----------------------

  webbff:
    build:
      context: ./src/WebBffService
      dockerfile: Dockerfile
    container_name: ecommerce-webbff
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Services__Order: "http://order:8080"
      Services__ProductCatalog: "http://catalog-lb:80"
      Seq__ServerUrl: "http://seq"
    depends_on:
      order:
        condition: service_started
      catalog-lb:
        condition: service_started
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "dotnet", "WebBffService.dll", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ----------------------- API Gateway (the ONLY exposed app entry) -----------------------

  apigateway:
    build:
      context: ./src/ApiGateway
      dockerfile: Dockerfile
    container_name: ecommerce-apigateway
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      Seq__ServerUrl: "http://seq"
    ports:
      - "8080:8080"
    depends_on:
      catalog-lb:
        condition: service_started
      inventory:
        condition: service_started
      order:
        condition: service_started
      notification:
        condition: service_started
      webbff:
        condition: service_started
      seq:
        condition: service_started
    healthcheck:
      test: ["CMD", "dotnet", "ApiGateway.dll", "--healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mongo-data:
  postgres-data:
  mssql-data:
  redis-data:
  rabbitmq-data:
  seq-data:
