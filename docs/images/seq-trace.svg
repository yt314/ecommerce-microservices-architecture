<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Seq — one order traced end-to-end by CorrelationId">
  <defs>
    <style>
      .bg    { fill: #0b1622; }
      .panel { fill: #0f2233; }
      .bar   { fill: #14304a; }
      .mono  { font: 13px 'Cascadia Code', 'Consolas', monospace; }
      .ui    { font: 13px 'Segoe UI', system-ui, sans-serif; }
      .uib   { font: 600 13px 'Segoe UI', system-ui, sans-serif; }
      .h     { font: 600 15px 'Segoe UI', system-ui, sans-serif; fill: #e6f0f7; }
      .ts    { fill: #7c93a6; }
      .txt   { fill: #cbd8e2; }
      .svc   { fill: #9fe6b0; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="560" rx="12"/>

  <!-- top chrome -->
  <rect class="panel" x="0" y="0" width="1200" height="52" rx="12"/>
  <rect class="panel" x="0" y="30" width="1200" height="22"/>
  <circle cx="26" cy="26" r="9" fill="#00a7e1"/>
  <text x="46" y="31" class="h">Seq</text>
  <text x="92" y="31" class="ui" fill="#7c93a6">·  Structured logs  ·  http://localhost:5341</text>

  <!-- filter bar -->
  <rect class="bar" x="20" y="66" width="1160" height="40" rx="8"/>
  <text x="36" y="91" class="mono" fill="#7c93a6">filter</text>
  <text x="92" y="91" class="mono" fill="#ffd479">CorrelationId</text>
  <text x="196" y="91" class="mono" fill="#cbd8e2">=</text>
  <text x="212" y="91" class="mono" fill="#8be9fd">'PHASE5-DEMO-001'</text>
  <rect x="1064" y="74" width="100" height="24" rx="6" fill="#00a7e1"/>
  <text x="1114" y="91" class="uib" fill="#04202e" text-anchor="middle">12 events</text>

  <!-- column header -->
  <text x="36"  y="132" class="uib" fill="#5f7688">TIME</text>
  <text x="150" y="132" class="uib" fill="#5f7688">LEVEL</text>
  <text x="250" y="132" class="uib" fill="#5f7688">SERVICE</text>
  <text x="430" y="132" class="uib" fill="#5f7688">MESSAGE</text>
  <line x1="20" y1="142" x2="1180" y2="142" stroke="#1c3346" stroke-width="1"/>

  <!-- rows -->
  <!-- helper: each row ~32px -->
  <g class="mono">
    <!-- 1 -->
    <text x="36" y="166" class="ts">14:02:11.204</text>
    <rect x="150" y="154" width="42" height="18" rx="4" fill="#1f4d6b"/><text x="171" y="166" class="ui" fill="#8be9fd" text-anchor="middle">INFO</text>
    <text x="250" y="166" class="svc">ApiGateway</text>
    <text x="430" y="166" class="txt">Correlation id created for POST /orders/api/orders</text>

    <text x="36" y="198" class="ts">14:02:11.239</text>
    <rect x="150" y="186" width="42" height="18" rx="4" fill="#1f4d6b"/><text x="171" y="198" class="ui" fill="#8be9fd" text-anchor="middle">INFO</text>
    <text x="250" y="198" class="svc">OrderService</text>
    <text x="430" y="198" class="txt">Order <tspan fill="#ffd479">a1f3</tspan> saved as <tspan fill="#f8fafc">Pending</tspan></text>

    <text x="36" y="230" class="ts">14:02:11.241</text>
    <rect x="150" y="218" width="62" height="18" rx="4" fill="#3a2a5a"/><text x="181" y="230" class="ui" fill="#c9b3ff" text-anchor="middle">PUBLISH</text>
    <text x="250" y="230" class="svc">OrderService</text>
    <text x="430" y="230" class="txt">→ <tspan fill="#c9b3ff">order.placed</tspan>  (ecommerce.events)</text>

    <text x="36" y="262" class="ts">14:02:11.318</text>
    <rect x="150" y="250" width="62" height="18" rx="4" fill="#2a4a2f"/><text x="181" y="262" class="ui" fill="#9fe6b0" text-anchor="middle">CONSUME</text>
    <text x="250" y="262" class="svc">InventoryService</text>
    <text x="430" y="262" class="txt">← <tspan fill="#c9b3ff">order.placed</tspan>  reserving 3 unit(s)</text>

    <text x="36" y="294" class="ts">14:02:11.352</text>
    <rect x="150" y="282" width="42" height="18" rx="4" fill="#1f4d6b"/><text x="171" y="294" class="ui" fill="#8be9fd" text-anchor="middle">INFO</text>
    <text x="250" y="294" class="svc">InventoryService</text>
    <text x="430" y="294" class="txt">Stock reserved — available 12 → 9</text>

    <text x="36" y="326" class="ts">14:02:11.361</text>
    <rect x="150" y="314" width="62" height="18" rx="4" fill="#3a2a5a"/><text x="181" y="326" class="ui" fill="#c9b3ff" text-anchor="middle">PUBLISH</text>
    <text x="250" y="326" class="svc">InventoryService</text>
    <text x="430" y="326" class="txt">→ <tspan fill="#c9b3ff">inventory.reserved</tspan></text>

    <text x="36" y="358" class="ts">14:02:11.402</text>
    <rect x="150" y="346" width="62" height="18" rx="4" fill="#2a4a2f"/><text x="181" y="358" class="ui" fill="#9fe6b0" text-anchor="middle">CONSUME</text>
    <text x="250" y="358" class="svc">OrderService</text>
    <text x="430" y="358" class="txt">← <tspan fill="#c9b3ff">inventory.reserved</tspan>  order <tspan fill="#ffd479">a1f3</tspan> → <tspan fill="#9fe6b0">Confirmed</tspan></text>

    <text x="36" y="390" class="ts">14:02:11.410</text>
    <rect x="150" y="378" width="62" height="18" rx="4" fill="#3a2a5a"/><text x="181" y="390" class="ui" fill="#c9b3ff" text-anchor="middle">PUBLISH</text>
    <text x="250" y="390" class="svc">OrderService</text>
    <text x="430" y="390" class="txt">→ <tspan fill="#c9b3ff">order.confirmed</tspan></text>

    <text x="36" y="422" class="ts">14:02:11.455</text>
    <rect x="150" y="410" width="62" height="18" rx="4" fill="#2a4a2f"/><text x="181" y="422" class="ui" fill="#9fe6b0" text-anchor="middle">CONSUME</text>
    <text x="250" y="422" class="svc">NotificationService</text>
    <text x="430" y="422" class="txt">← <tspan fill="#c9b3ff">order.confirmed</tspan>  recorded notification</text>

    <text x="36" y="454" class="ts">14:02:11.461</text>
    <rect x="150" y="442" width="42" height="18" rx="4" fill="#1f4d6b"/><text x="171" y="454" class="ui" fill="#8be9fd" text-anchor="middle">INFO</text>
    <text x="250" y="454" class="svc">NotificationService</text>
    <text x="430" y="454" class="txt">"Confirmed" notification sent to obs@demo.com</text>
  </g>

  <!-- highlighted correlation column strip -->
  <rect x="1000" y="150" width="180" height="316" rx="8" fill="#0d2a1c" stroke="#1f5a3a" stroke-width="1"/>
  <text x="1090" y="176" class="uib" fill="#7fdc9a" text-anchor="middle">CorrelationId</text>
  <text x="1090" y="198" class="mono" fill="#8be9fd" text-anchor="middle" font-size="11">PHASE5-DEMO-001</text>
  <line x1="1016" y1="212" x2="1164" y2="212" stroke="#1f5a3a"/>
  <text x="1090" y="238" class="ui" fill="#a9c2d1" text-anchor="middle" font-size="12">shared by all 12</text>
  <text x="1090" y="256" class="ui" fill="#a9c2d1" text-anchor="middle" font-size="12">events — across</text>
  <text x="1090" y="274" class="ui" fill="#a9c2d1" text-anchor="middle" font-size="12">HTTP <tspan fill="#f8fafc">and</tspan> the</text>
  <text x="1090" y="292" class="ui" fill="#a9c2d1" text-anchor="middle" font-size="12">RabbitMQ hops</text>
  <text x="1090" y="330" class="ui" fill="#9fe6b0" text-anchor="middle" font-size="26">✓</text>
  <text x="1090" y="360" class="ui" fill="#7fdc9a" text-anchor="middle" font-size="12">one order =</text>
  <text x="1090" y="378" class="ui" fill="#7fdc9a" text-anchor="middle" font-size="12">one timeline</text>
</svg>
